<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>PixelArena</title>
    <meta name="description" content="PixelArena: 20 addictive mini-games including Snake, Tetris, Wordle, Minesweeper, Hangman, and more. Free, no downloads required!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Persistent Global Auth Modal -->
    <div id="global-auth-modal" class="game-over-overlay" style="display:none; z-index: 9999;">
      <div class="game-over-card" style="position: relative; text-align: center;">
        <button type="button" id="close-global-auth" style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; font-size: 2rem; cursor: pointer; color: var(--text-mid);">&times;</button>
        <div class="emoji" style="font-size: 3rem; margin-bottom: 0.5rem;">🔑</div>
        <h2 style="font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--text-dark);">Connect to PixelArena</h2>
        <input type="text" id="global-auth-username" class="game-input" placeholder="Username" style="margin-bottom: 0.5rem; text-align: center; font-size: 1.1rem;" maxlength="15" autocomplete="off" />
        <input type="password" id="global-auth-password" class="game-input" placeholder="Password" style="margin-bottom: 1rem; text-align: center; font-size: 1.1rem;" autocomplete="off" />
        <div style="display:flex; gap:0.5rem;">
          <button type="button" id="global-btn-login" class="btn btn-primary" style="flex:1; padding: 12px;">Login</button>
          <button type="button" id="global-btn-register" class="btn btn-secondary" style="flex:1; padding: 12px; border: 2px solid #667eea; color: #667eea; background:transparent;">Register</button>
        </div>
        <p id="global-auth-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display:none;"></p>
      </div>
    </div>

    <!-- Persistent Global Chat UI -->
    <button type="button" class="chat-btn" id="chat-toggle" style="display:none;">💬</button>
    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <h3>Global Chat</h3>
        <button type="button" id="chat-close" style="background:transparent;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-mid);">&times;</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-msg">
          <span class="author">System</span>
          Welcome to the PixelArena Global Chat! Say hi to other players.
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100" autocomplete="off" />
        <button type="button" id="chat-send">Send</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</html>
